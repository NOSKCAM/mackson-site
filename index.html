<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mackson Technology</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .logo {
      width: 160px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px #3b82f6)
              drop-shadow(0 0 25px #3b82f6);
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);}
      50% { transform: scale(1.05);}
    }

    h1 {
      font-size: 24px;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      position: relative;
      padding: 15px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(59, 130, 246, 0.2);
      backdrop-filter: blur(10px);
      transition: 0.3s;
      overflow: hidden;
    }

    .link::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(59,130,246,0.6), transparent);
      top: 0;
      left: -100%;
      transition: 0.5s;
    }

    .link:hover::before {
      left: 100%;
    }

    .link:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- SUA LOGO -->
    <img class="logo" src="logo.png" alt="Mackson Technology">

    <h1>Mackson Technology</h1>
    <p>Assistência técnica em celular e PC</p>

    <div class="links">
      <a class="link" href="https://wa.me/5587981750054" target="_blank">📱 Falar no WhatsApp</a>
      <a class="link" href="https://instagram.com/mackson.technology" target="_blank">📸 Instagram</a>
      <a class="link" href="#">💻 Serviços</a>
      <a class="link" href="#">⚡ Formatação</a>
      <a class="link" href="#">🔧 Manutenção</a>
    </div>

    <div class="footer">
      © 2026 Mackson Technology
    </div>

  </div>

</body>
</html>

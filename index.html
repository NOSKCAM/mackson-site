<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mackson Technology</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #020617;
  overflow: hidden;
  color: white;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 380px;
  padding: 30px 20px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(20px);
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(59,130,246,0.2);
  box-shadow: 0 0 50px rgba(59,130,246,0.2);
  transform-style: preserve-3d;
  transition: transform 0.2s;
}

.logo {
  width: 150px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 20px #3b82f6);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-8px);}
}

h1 { font-size: 24px; }

p {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 25px;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.link {
  position: relative;
  padding: 16px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  overflow: hidden;
  transition: 0.25s;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  background: linear-gradient(145deg, rgba(15,23,42,0.9), rgba(30,41,59,0.6));
  border: 1px solid rgba(59,130,246,0.2);
}

.link::after {
  content: "";
  position: absolute;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  top: 0;
  left: -120%;
  transition: 0.6s;
}

.link:hover::after {
  left: 120%;
}

.link:hover {
  transform: translateY(-3px) scale(1.03);
}

.link:active {
  transform: scale(0.96);
}

.link svg {
  transition: 0.3s;
}

.link:hover svg {
  transform: scale(1.2) rotate(5deg);
}

/* CORES */
.link:nth-child(1):hover {
  box-shadow: 0 0 25px #25D366;
  border-color: #25D366;
}

.link:nth-child(2):hover {
  box-shadow: 0 0 25px #E1306C;
  border-color: #E1306C;
}

.link:nth-child(3):hover {
  box-shadow: 0 0 25px #3b82f6;
  border-color: #3b82f6;
}

/* ripple */
.link span {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 0.6s linear;
  background: rgba(59,130,246,0.5);
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #64748b;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container" id="card">

  <img class="logo" src="logo.png">

  <h1>Mackson Technology</h1>
  <p>Assistência técnica em celular e PC</p>

  <div class="links">

    <a class="link" href="https://wa.me/5587981750054?text=Olá,%20quero%20um%20orçamento" target="_blank">
      <!-- WhatsApp -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#25D366" viewBox="0 0 24 24">
        <path d="M20.52 3.48A11.82 11.82 0 0 0 12.05 0C5.43 0 .07 5.36.07 11.98c0 2.11.55 4.17 1.6 5.98L0 24l6.21-1.63a11.93 11.93 0 0 0 5.84 1.49h.01c6.62 0 11.98-5.36 11.98-11.98 0-3.2-1.25-6.21-3.52-8.4z"/>
      </svg>
      WhatsApp
    </a>

    <a class="link" href="https://instagram.com/mackson.technology" target="_blank">
      <!-- Instagram -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#E1306C" viewBox="0 0 24 24">
        <path d="M7.75 2C4.57 2 2 4.57 2 7.75v8.5C2 19.43 4.57 22 7.75 22h8.5C19.43 22 22 19.43 22 16.25v-8.5C22 4.57 19.43 2 16.25 2h-8.5z"/>
      </svg>
      Instagram
    </a>

    <a class="link" href="https://www.instagram.com/s/aGlnaGxpZ2h0OjE4MDg4ODYyMjAxMTM3MTgy?igsh=MXFyZXgzejl5enRzbg==" target="_blank">
      <!-- Verificado -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#3b82f6" viewBox="0 0 24 24">
        <path d="M12 0l3.09 6.26L22 7.27l-5 4.87L18.18 20 12 16.9 5.82 20 7 12.14 2 7.27z"/>
      </svg>
      Serviços Finalizados
    </a>

  </div>

  <div class="footer">
    © 2026 Mackson Technology
  </div>

</div>

<script>
// FUNDO PARTICULAS
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5),
    dy: (Math.random() - 0.5)
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = "#3b82f6";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

// PARALLAX
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 25;
  let y = (window.innerHeight / 2 - e.clientY) / 25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// RIPPLE
document.querySelectorAll(".link").forEach(btn => {
  btn.addEventListener("click", function(e) {
    let ripple = document.createElement("span");
    ripple.style.left = e.offsetX + "px";
    ripple.style.top = e.offsetY + "px";
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});
</script>

</body>
</html>
